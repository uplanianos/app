<html>
<head>

<style>	
body {
 background-color: #000000FF;
 background-image: linear-gradient(to bottom, black, #151B54, #36013F);
 background-repeat: no-repeat;
 background-attachment: fixed;
 background-size: 500% 100%;
 font-family: Verdana, Tahoma, Helvetica, Sans-serif;
 font-size: 12px;
 margin-left: 0px;
 margin-right: 0px;
 -webkit-user-select: none; /* Safari */
 -ms-user-select: none; /* IE 10 and IE 11 */
 user-select: none; /* Standard syntax */
}

body::-webkit-scrollbar { display: none; }

.titleDiv {
 margin: auto;
 margin-bottom: 12px;
 width: 88%;
 align: center;
 font-size: 1em;
 font-weight: bold;
 color: white;
 padding: 16px;
 }

.rollDiv {
 margin: auto;
 margin-bottom: 26px;
 width: 50%;
 color: white;
 background: #AAAAFF88;
 border: 2px dashed white;
 border-radius: 16px;
 padding: 12px;
 }

.inputFields {
 display: flex-grid; width: 320px;
 margin: auto; margin-left: 20%;
 color: Blue; background: #FFF;
 text-align: center; font-size: 14px;
 font-family: Verdana, Tahoma;
 border: 1px solid white;
 border-radius: 12px;
 padding: 10px;
 text-transform: capitalize;
 disabled: true;
 }

.inputFields::placeholder { opacity: 0.6; color: red; }
.inputFields:focus { background-color: yellow; }

.allButtons {
 margin: auto;
 margin-bottom: 10px;
 transform: translate(20%, 0px);
 width: max-content;
 align-items: center;
 justify-content: center;
 background: #FFFFFF33;
 border: 1px solid lightgray;
 border-radius: 12px;
 padding: 6px;
 }

.thisButton {
 width: 112px;
 text-align: center;
 font-weight: bold;
 color: lightgray;
 border: 2px solid lightgray;
 border-radius: 6px;
 margin: 6px 32px;
 padding: 6px 24px;
 cursor: pointer;
 }

.thisButton:hover {
 color: white;
 border: 2px solid white;
 }

@media screen and (max-width: 800px) {
 .rollDiv { width: 80%; }
 .inputFields { margin-left: 0%; width: 90%; }
 .allButtons { transform: translate(0px, 0px); }

}
</style>

<body>


<div class="titleDiv">Registro de Asistencia Automática:</div>
 <div class="rollDiv">
 FECHA DE HOY:&nbsp; <input type="text" class="inputFields" id="autoDate" value="0000-00-00" disabled style="cursor: not-allowed; background: #FFAACC;"><br><br>
 HORA ACTUAL:&nbsp;&nbsp; <input type="text" class="inputFields" id="autoTime" value="00:00" disabled style="cursor: not-allowed; background: #FFAACC;"><br><br>
 <span id="internetTime" style="display: none; visibility: hidden;">
 HORA ONLINE:&nbsp;&nbsp; <input type="text" class="inputFields" id="ntpTime" placeholder="T00:00?" disabled style="cursor: not-allowed; background: #FFAACC;"><br><br>
 </span>
 ASIGNATURA:&nbsp;&nbsp;&nbsp;&nbsp; <input type="text" class="inputFields" id="thisClass" placeholder="* Nombre Asignatura"><br><br>
 ACADÉMICO/A:&nbsp;&nbsp; <input type="text" class="inputFields" id="thisTeach" placeholder="* Apellido, Nombre"><br><br>
 TUS APELLIDOS: <input type="text" class="inputFields" id="lastNames" placeholder="* Apellido Apellido"><br><br>
 TUS NOMBRES:&nbsp;&nbsp; <input type="text" class="inputFields" id="firstNames" placeholder="* Nombre Nombre"><br><br>

 <span style="display: none;">
 ATTEND TIME:&nbsp;&nbsp;&nbsp;&nbsp; <input type="text" class="inputFields" id="attendTime" disabled style="cursor: not-allowed; text-transform: none;"><br><br>
 </span>

 <div class="allButtons">
  <div style="font-size: 10px;text-align: center; padding: 6px;" id="currentStatus">...</div>
  <div class="thisButton" id="rosterButton" style="background: blue; display: block;">Nómina!</div>
  <div class="thisButton" id="attendButton" style="background: green; display: none;">Presente!</div>
 </div>

</div>

<!- SAVE FUNCTION ->
<script type="text/javascript">
// ==============================
// LOCAL STORAGE - SAVE FUNCTION!
// ==============================
window.onbeforeunload = function() {
if (typeof(Storage) !== "undefined") { saveData() }
}

function saveData() {
 localStorage.thisClass = document.getElementById("thisClass").value
 localStorage.thisTeach = document.getElementById("thisTeach").value
 localStorage.lastNames = document.getElementById("lastNames").value
 localStorage.firstNames = document.getElementById("firstNames").value
 localStorage.attendTime = document.getElementById("attendTime").value
}
// END OF "BEFORE LOAD"

window.onload = function() {
 // LOAD DATA!
 loadData()
 // CALLS TO ANOTHER FUNCTION!!
 rollCall()

function loadData() {
 document.getElementById("thisClass").value = localStorage.thisClass || ""
 document.getElementById("thisTeach").value = localStorage.thisTeach || ""
 document.getElementById("lastNames").value = localStorage.lastNames || ""
 document.getElementById("firstNames").value = localStorage.firstNames || ""
 document.getElementById("attendTime").value = localStorage.attendTime || ""
 }

// END OF ONLOAD
}
</script>


<script type="text/javascript">
// ===================
// MAIN FUNCTION!
// ===================

// DECLARING ALL ELLEMENTS
// ===================
// ALL FIXED INPUT ELEMENTS!
let autoTime = document.getElementById("autoTime")
let thisClass = document.getElementById("thisClass")
let thisTeach = document.getElementById("thisTeach")
let lastNames = document.getElementById("lastNames")
let firstNames = document.getElementById("firstNames")
let attendTime = document.getElementById("attendTime")
// BUTTONS
let rosterBT = document.getElementById("rosterButton")
let attendBT = document.getElementById("attendButton")
// VARIABLES
let currentStatus = document.getElementById("currentStatus")
let currentTime // IN MILLISECONDS, UPDATE LATER!
let thisPeriod = 0 // UPDATED LATER IN PERIOD FUNCTIONS!
let notPresent = true // CHECKS PREVIOUS ATTENDANCE!
let inputReady // CHECKS STUDENT INPUTS ARE READY!
// TIME VARIABLES
let onTime = false
let soLate = false
let noShow = true
// ===================

/*
// CHECKS ARE NOW DISABLED!!
// =========================
// PERFORMING INITIAL CHECKS!
console.log("INITIAL CHECKS:")
setTimeout(function(){
 console.log("Class: " + thisClass.value)
 console.log("Teacher: " + thisTeach.value)
 console.log("LNs: " + lastNames.value)
 console.log("FNs: " + firstNames.value)
 console.log("Attended: " + attendTime.value)
 // Buttons!
 console.log("\nBUTTON DISPLAY:\nAttend: " + attendBT.style.display)
 console.log("Roster: " + rosterBT.style.display)
}, 1000)
setTimeout(function(){
 console.log("\nCURRENT STATUS:")
}, 1800)
setTimeout(function(){
 console.log("Period: " + thisPeriod)
 console.log("Inputs: " + inputReady)
 console.log("Absent: " + isAbsent)
 console.log("Status: " + currentStatus.innerHTML)
}, 2000)
// CHECKS ARE NOW DISABLED!!
// =========================
*/


// ===================
// ROLL CALL FUNCTION!
// ===================
function rollCall() {
// CREATING CURRENT DATE & TIME LOOP (REFRESHING EVERY SECOND)
setInterval(() => {
 // GETTING CURRENT DATE!
 let thisDate = new Date()
 currentTime = thisDate.getTime()
 // GETTING CURRENT MONTH AND DATE
 let thisYear = thisDate.getFullYear()
 let thisMonth = thisDate.getMonth()+1 // Jan. was zero!
 let thisDay = thisDate.getDate()
 // GETTING CURRENT HOUR AND MINUTES
 let thisHour = thisDate.getHours()
 let thisMinute = thisDate.getMinutes()
 let thisSecond = thisDate.getSeconds()


 // SETTING UP & UPDATING ELEMENTS
 // DOUBLE MONTH
 var doubleMonth
 if (thisMonth >= 1 && thisMonth <=9) { doubleMonth = "0" + thisMonth }
 else { doubleMonth = thisMonth }
 // DOUBLE DATE
 var doubleDay
 if (thisDay.toString().length == 1) { doubleDay = "0" + thisDay }
 else { doubleDay = thisDay }
 // UPDATING AUTO-DATE:
 let autoDateString = thisYear + "-" + doubleMonth + "-" + doubleDay
 var autoDate = document.getElementById("autoDate")
 autoDate.value = autoDateString

 // UPDATING AUTO-TIME
 thisHour = checkTime(thisHour)
 thisMinute = checkTime(thisMinute)
 thisSecond = checkTime(thisSecond)
 autoTime.value = thisHour + ":" + thisMinute + ":" + thisSecond


// ===========================
// TIME PERIODS FUNCTIONALITY!
// ===========================

// CLASS PERIOD - 8:00 (1)
if (thisHour ==  8) { thisPeriod = 1
     if (thisMinute >=  0 && thisMinute <= 15) { onTime = true }
     if (thisMinute >= 16 && thisMinute <= 30) { soLate = true }
     }

// CLASS PERIOD - 09:30 (2)
else if (thisHour ==  9) { thisPeriod = 2
     if (thisMinute >= 30 && thisMinute <= 45) { onTime = true }
     if (thisMinute >= 46) { soLate = true }
     }
else if (thisHour == 10 && thisMinute == 00) { soLate = true }

// CLASS PERIOD - 11:00 (3)
else if (thisHour == 11) { thisPeriod = 3
     if (thisMinute >=  0 && thisMinute <= 15) { onTime = true }
     if (thisMinute >= 16 && thisMinute <= 30) { soLate = true }
     }

// CLASS PERIOD - 12:30 (4)
else if (thisHour == 12) { thisPeriod=4
     if (thisMinute >= 30 && thisMinute <= 45) { onTime = true }
     if (thisMinute >= 46) { soLate = true }
     }
else if (thisHour == 13 && thisMinute == 00) { soLate = true }

// CLASS PERIOD - 14:00 (5)
else if (thisHour == 14) { thisPeriod = 5
     if (thisMinute >=  0 && thisMinute <= 15) { onTime = true }
     if (thisMinute >= 16 && thisMinute <= 30) { soLate = true }
     }

// CLASS PERIOD - 15:30 (6)
else if (thisHour == 15) { thisPeriod = 6
     if (thisMinute >= 30 && thisMinute <= 45) { onTime = true }
     if (thisMinute >= 46) { soLate = true }
     }
else if (thisHour == 16 && thisMinute == 00) { soLate = true }

// CLASS PERIOD - 17:00 (7)
else if (thisHour == 17) { thisPeriod = 7
     if (thisMinute >=  0 && thisMinute <= 15) { onTime = true }
     if (thisMinute >= 16 && thisMinute <= 30) { soLate = true }
     }

// CLASS PERIOD - 18:30 (8)
else if (thisHour == 18) { thisPeriod = 8
     if (thisMinute >= 30 && thisMinute <= 45) { onTime = true }
     if (thisMinute >= 46) { soLate = true }
     }
else if (thisHour ==  19 && thisMinute == 00) { soLate = true }

// TESTING - REMEMBER TO COMMENT OUT!
// else if (thisHour == 21) {
//     if (thisMinute >=  0 && thisMinute <= 15) { onTime = true }
//     if (thisMinute >= 16 && thisMinute <= 30) { soLate = true }
//     }

// TESTING - REMEMBER TO COMMENT OUT!
// else if (thisHour == 20) {
//     if (thisMinute >= 30 && thisMinute <= 45) { onTime = true }
//     if (thisMinute >= 46) { soLate = true }
//     }

// ANY OTHER TIME - NO SHOW!
else { noShow = true; thisPeriod = 0 }


// ==============================
// CHECKING PREVIOUS ATTENDANCE!
// ==============================
let theDiff = (Math.abs(currentTime - attendTime.value) / 1000).toFixed(0)
if (theDiff <= 2000) { isAbsent = true }
else { isAbsent = false }
// CHECKING!
// console.log("Test time: 18:48",theDiff,"Absent: "+isAbsent)


// ========================
// COLORING COMPLETE FIELDS!
// ========================
 let theFields = document.querySelectorAll(".inputFields")
 for(let studentInput of theFields) {
  if (studentInput.value !== "") { studentInput.style.backgroundColor = "#88FF88" }
  else { studentInput.style.backgroundColor = "" }
 }


// ======================
// CHECKING STUDENT INPUT!
// ======================
// INPUTS READY!
if (thisClass.value !== "" && thisTeach.value !== "" &&
    lastNames.value !== "" && firstNames.value !== "" ) { inputReady = true }
else { inputReady = false } // EMPTY INPUTS!


// ===============
// SHOW BUTTONS??
// ===============
if (inputReady && onTime && notPresent) {
 attendBT.style.display = "block"
 attendBT.style.background = "green"
 attendBT.innerHTML = "PRESENTE!"
 rosterBT.style.display = "none"
 currentStatus.innerHTML = "Muy bien... estás a tiempo!"
 enableNames()
}

else if (inputReady && soLate && notPresent) {
 attendBT.style.display = "block"
 attendBT.style.background = "red"
 attendBT.innerHTML = "TARDE!"
 rosterBT.style.display = "none"
 currentStatus.innerHTML = "Tarde... registrar igualmente!"
 enableNames()
}

else if (!notPresent) {
 currentStatus.innerHTML = "Estás presente... revisa la nómina."
 disableNames()
}

else {
 rosterBT.style.display = "block"
 attendBT.style.display = "none"
 currentStatus.innerHTML = "Inscripción finalizada!"
}


// =========================
// CURRENT TIME PROGRESS BAR
// =========================
let barSet
let barEnd
let barDif
let dateString = thisYear + "-" + checkTime(thisMonth) + "-" + checkTime(thisDay) + "T"
     if (thisPeriod == 1) { barSet = new Date(dateString+'08:00:00'); barEnd = new Date(dateString+'09:15:00') }
else if (thisPeriod == 2) { barSet = new Date(dateString+'09:30:00'); barEnd = new Date(dateString+'10:45:00') }
else if (thisPeriod == 3) { barSet = new Date(dateString+'11:00:00'); barEnd = new Date(dateString+'12:15:00') }
else if (thisPeriod == 4) { barSet = new Date(dateString+'12:30:00'); barEnd = new Date(dateString+'13:45:00') }
else if (thisPeriod == 5) { barSet = new Date(dateString+'14:00:00'); barEnd = new Date(dateString+'15:15:00') }
else if (thisPeriod == 6) { barSet = new Date(dateString+'15:30:00'); barEnd = new Date(dateString+'16:45:00') }
else if (thisPeriod == 7) { barSet = new Date(dateString+'17:00:00'); barEnd = new Date(dateString+'18:15:00') }
else if (thisPeriod == 8) { barSet = new Date(dateString+'18:30:00'); barEnd = new Date(dateString+'19:45:00') }
else { barSet = new Date(dateString+'00:00:00'); barEnd = new Date(dateString+'23:59:59') }

// TESTING HOURS - REMEMBER TO COMMENT OUT!!
// barSet = new Date(dateString+'21:38:00')
// barEnd = new Date(dateString+'22:00:00')

// GETTING PERIOD PROGRESS (PERCENTAGE)!
let thisDiff = (currentTime - barSet)/(barEnd - barSet)*100
let barPercent = parseFloat(thisDiff).toFixed(4)

// BAR COLORS
let barGreeny = 'linear-gradient(to right, lightgreen 0%, #50C878 ' + barPercent + '%, #fff ' + barPercent + '%, lightgray 100%)' 
let barPinkie = 'linear-gradient(to right, pink 0%, #FF3333cc ' + barPercent + '%, #fff ' + barPercent + '%, lightgray 100%)'
let barPurple = 'linear-gradient(to right, #FFCCFFdd 0%, #FF66FFdd ' + barPercent + '%, #fff ' + barPercent + '%, lightgray 100%)'

// SETTING PROGRESS BAR
if (barPercent >= 00 && barPercent <= 20) { autoTime.style.background = barGreeny }
if (barPercent >= 21 && barPercent <= 40) { autoTime.style.background = barPinkie }
if (barPercent >= 41) { autoTime.style.background = barPurple }

// ============
// END TIME LOOP!
// ============
}, 1000)



// ====================
// BUTTON CLICK EVENTS!
// ====================
attendBT.addEventListener("click", function() {
 alert("Registrando!")
 attendTime.value = currentTime
 rosterBT.style.display = "block"
 attendBT.style.display = "none"
})

rosterBT.addEventListener("click", function() {
 alert("Ver nómina!")
})



// CALL ONLINE TIME FUNCTION (ONCE)!
// DISABLED!: script works locally,
// but gives safety error online.
// getOnlineTime()


// ========================
// GOOGLE SCRIPT FUNCTIONS!
// ========================
// google.script.run.customScriptName()



// ======================================
// GETTING CLASS NAME FROM LINK PARAMETER!
// ======================================
var urlClass = (new URLSearchParams(window.location.search)).get("clase")
var urlTeach = (new URLSearchParams(window.location.search)).get("profe")
// PRINTING CLASS ELEMENT
thisClass.value = urlClass
thisTeach.value = urlTeach
// DISABLING CLASS FIELD
if (thisClass.value !== "" || thisClass.value.length > 0) { thisClass.disabled = true; thisClass.style.cursor = "not-allowed" }
if (thisClass.value.length == 0) { thisClass.disabled = false; thisClass.style.cursor = "" }
// DISABLING TEACHER FIELD
if (thisTeach.value !== "" || thisTeach.value.length > 0) { thisTeach.disabled = true; thisTeach.style.cursor = "not-allowed" }
if (thisTeach.value.length == 0) { thisTeach.disabled = false; thisTeach.style.cursor = "" }
// FORMAT: /nomina.html?clase=Inglés Básico 2
// FORMAT: /nomina.html?profe=Méndez, Juan


// ============================
// END OF MAIN SCRIPT FUNCTION!
// ============================
}




// ============================
// CHECK ZERO TIME SCRIPT!
// ============================
function checkTime(i) {
if (i < 10) { i = "0" + i }
return i
}



function enableNames() {
// ENABLE NAMES
 lastNames.disabled = false
 firstNames.disabled = false
 lastNames.style.cursor = ""
 firstNames.style.cursor = ""
}


function disableNames() {
// DISABLE NAMES!
 lastNames.disabled = true
 firstNames.disabled = true
 lastNames.style.cursor = "not-allowed"
 firstNames.style.cursor = "not-allowed"
}



// =====================
// ONLINE TIME FUNCTION!
// (DISABLED FROM PREVIOUS SCRIPT)!
// =====================
function getOnlineTime() {
try {
 let xhr = new XMLHttpRequest()  // XMLHttpRequest object
 let url = "http://worldclockapi.com/api/json/utc/now" // NTP URL

 // callback function to handle the response!
 xhr.onreadystatechange = function() {
 if (this.readyState == 4 && this.status == 200) {
  let response = JSON.parse(this.responseText) // Parse the response JSON
  let ntpTime = response.currentDateTime // Get NTP time from responde!

  // SETTING UP INTERNET HOURS!
  let ntpHour = ntpTime.slice(11,13)
  let netHourMinus = ntpHour-04
  if (ntpHour == 00) { ntpHourMinus = "20" }
  else if (ntpHour == 01) { ntpHourMinus = "21" }
  else if (ntpHour == 02) { ntpHourMinus = "22" }
  else if (ntpHour == 03) { ntpHourMinus = "23" }
  else { ntpHourMinus = ntpHour-04 }
  // SETTING UP INTERNET MINUTES!
  let ntpMins = ntpTime.slice(14,16)
  let ntpLocalString = ntpHourMinus + ":" + ntpMins

  if (ntpTime !== null || ntpTime !== undefined) {
   let interTime = document.getElementById("internetTime") // Span element!
   interTime.style.display = "block"
   interTime.style.visibility = "visible"
   }
  // Display the NTP time on the HTML page
  // document.getElementById("ntpTime").value = ntpTime // FULL DATE!
  // document.getElementById("ntpTime").value = ntpTime.slice(11,16) // Time only!
  document.getElementById("ntpTime").value = ntpLocalString
  }
 }
  // Send the GET request to fetch the NTP time
  xhr.open("GET", url, true); xhr.send()
  // END OF ONLINE TIME!
  } catch (error) { console.error('ERROR DETECTED:', error) }

// END OF ONLINE TIME FUNCTION!
}



// END OF JAVASCRIPT CODE!!
</script>
