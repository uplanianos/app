<script type="text/javascript">

// TIME VARIABLES

let isPeriod = 0 // UPDATED LATER IN PERIOD FUNCTIONS!

let soLate = false

// ===================

// ROLL CALL FUNCTION!
// ===================
function rollCall() {
// CREATING CURRENT DATE & TIME LOOP (REFRESHING EVERY SECOND)
setInterval(() => {
 // GETTING CURRENT DATE!
 let thisDate = new Date()
 currentTime = thisDate.getTime()
 // GETTING CURRENT MONTH AND DATE
 let thisYear = thisDate.getFullYear()
 let thisMonth = thisDate.getMonth()+1 // Jan. was zero!
 let thisDay = thisDate.getDate()
 // GETTING CURRENT HOUR AND MINUTES
 let thisHour = thisDate.getHours()
 let thisMinute = thisDate.getMinutes()
 let thisSecond = thisDate.getSeconds()

 // SETTING UP & UPDATING ELEMENTS
 thisMonth = checkTime(thisMonth)
 thisDay = checkTime(thisDay)
 autoDateString = thisYear + "-" + thisMonth + "-" + thisDay
 autoDate.value = autoDateString

 // UPDATING AUTO-TIME
 thisHour = checkTime(thisHour)
 thisMinute = checkTime(thisMinute)
 thisSecond = checkTime(thisSecond)
 autoTime.value = thisHour + ":" + thisMinute + ":" + thisSecond



// TIME PERIODS FUNCTIONALITY!
// ===========================

let theTime = parseInt(thisHour+""+thisMinute) // FORMAT: 0800, or 1115, etc.

// CLASS PERIOD - 00:00 (0)
if (theTime >= 0000 && theTime <= 0759) { isPeriod = 0 }

// CLASS PERIOD - 8:00 (1)
else if (theTime >= 0800 && theTime < 0815) { isPeriod = 1; onTime =  true; soLate = false; noShow = false }
else if (theTime >= 0815 && theTime < 0830) { isPeriod = 1; onTime = false; soLate =  true; noShow = false }
else if (theTime >= 0830 && theTime < 0915) { isPeriod = 1; onTime = false; soLate = false; noShow = true }
else if (theTime >= 0915 && theTime < 0930) { isPeriod = 11; noShow = true }

// CLASS PERIOD - 09:30 (2)
else if (theTime >= 0930 && theTime < 0945) { isPeriod = 2; onTime =  true; soLate = false; noShow = false }
else if (theTime >= 0945 && theTime < 1000) { isPeriod = 2; onTime = false; soLate =  true; noShow = false }
else if (theTime >= 1000 && theTime < 1045) { isPeriod = 2; onTime = false; soLate = false; noShow = true }
else if (theTime >= 1045 && theTime < 1100) { isPeriod = 12; noShow = true }

// CLASS PERIOD - 11:00 (3)
else if (theTime >= 1100 && theTime < 1115) { isPeriod = 3; onTime =  true; soLate = false; noShow = false }
else if (theTime >= 1115 && theTime < 1130) { isPeriod = 3; onTime = false; soLate =  true; noShow = false }
else if (theTime >= 1130 && theTime < 1215) { isPeriod = 3; onTime = false; soLate = false; noShow = true }
else if (theTime >= 1215 && theTime < 1230) { isPeriod = 13; noShow = true }

// CLASS PERIOD - 12:30 (4)
else if (theTime >= 1230 && theTime < 1245) { isPeriod = 4; onTime =  true; soLate = false; noShow = false }
else if (theTime >= 1245 && theTime < 1300) { isPeriod = 4; onTime = false; soLate =  true; noShow = false }
else if (theTime >= 1300 && theTime < 1345) { isPeriod = 4; onTime = false; soLate = false; noShow = true }
else if (theTime >= 1345 && theTime < 1400) { isPeriod = 14; noShow = true }

// CLASS PERIOD - 14:00 (5)
else if (theTime >= 1400 && theTime < 1415) { isPeriod = 5; onTime =  true; soLate = false; noShow = false }
else if (theTime >= 1415 && theTime < 1430) { isPeriod = 5; onTime = false; soLate =  true; noShow = false }
else if (theTime >= 1430 && theTime < 1515) { isPeriod = 5; onTime = false; soLate = false; noShow = true }
else if (theTime >= 1515 && theTime < 1530) { isPeriod = 15; noShow = true }

// CLASS PERIOD - 15:30 (6)
else if (theTime >= 1530 && theTime < 1545) { isPeriod = 6; onTime =  true; soLate = false; noShow = false }
else if (theTime >= 1545 && theTime < 1600) { isPeriod = 6; onTime = false; soLate =  true; noShow = false }
else if (theTime >= 1600 && theTime < 1645) { isPeriod = 6; onTime = false; soLate = false; noShow = true }
else if (theTime >= 1645 && theTime < 1700) { isPeriod = 16; noShow = true }

// CLASS PERIOD - 17:00 (7)
else if (theTime >= 1700 && theTime < 1715) { isPeriod = 7; onTime =  true; soLate = false; noShow = false }
else if (theTime >= 1715 && theTime < 1730) { isPeriod = 7; onTime = false; soLate =  true; noShow = false }
else if (theTime >= 1730 && theTime < 1815) { isPeriod = 7; onTime = false; soLate = false; noShow = true }
else if (theTime >= 1815 && theTime < 1830) { isPeriod = 17; noShow = true }

// CLASS PERIOD - 18:30 (8)
else if (theTime >= 1830 && theTime < 1845) { isPeriod = 8; onTime =  true; soLate = false; noShow = false }
else if (theTime >= 1845 && theTime < 1900) { isPeriod = 8; onTime = false; soLate =  true; noShow = false }
else if (theTime >= 1900 && theTime < 1945) { isPeriod = 8; onTime = false; soLate = false; noShow = true }
else if (theTime >= 1945 && theTime <= 2359) { isPeriod = 18; noShow = true }

// ANY OTHER TIME - NO SHOW!
else if (!onTime || !soLate) { noShow = true; isPeriod = 24 }



// CHECKING PREVIOUS ATTENDANCE!
// ==============================
let theDiff = (Math.abs(currentTime - attendTime.value) / 1000).toFixed(0)
if (theDiff <= 2000) { isPresent = true }
else { isPresent = false }



// CHECKING STUDENT INPUT!
// ======================
// INPUTS READY!
if (thisClass.value !== "" && thisTeach.value !== "" &&
    lastNames.value !== "" && firstNames.value !== "" ) { inputReady = true; }
else { inputReady = false }



// COLORING COMPLETE FIELDS!
// ========================
let theFields = document.querySelectorAll(".theInputs")
for(let studentInput of theFields) {
	if (studentInput.value !== "" && studentInput.readOnly == true) { studentInput.style.backgroundColor = "#CCFFCCee" }
   else if (studentInput.value !== "" && !studentInput.disabled) { studentInput.style.backgroundColor = "#88FF88ee" }
   else { studentInput.style.backgroundColor = ""; currentStatus.innerHTML = "Completa tus datos!" }
}



// SHOW BUTTONS??
// ===============
if (inputReady && !isPresent) {
 if (onTime) {
  attendBT.style.background = "green"
  attendBT.innerText = "☝️ PRESENTE!"
  attendBT.style.display = "block"
  rosterBT.style.display = "none"
  currentStatus.innerHTML = "Estás a tiempo... registrate!"
  thisPeriod.value = isPeriod
  rollStatus.value = "Presente"
  enableInput()
 }
 if (soLate) {
  attendBT.style.background = "red"
  attendBT.innerText = "👇 TARDE!"
  attendBT.style.display = "block"
  rosterBT.style.display = "none"
  currentStatus.innerHTML = "Tarde... registrar igualmente!"
  thisPeriod.value = isPeriod
  rollStatus.value = "Tarde"
  enableInput()
 }
}

if (!inputReady) {
 rosterBT.style.display = "block"
 attendBT.style.display = "none"
 currentStatus.innerHTML = "Completa tus datos!"
 enableInput()
}

if (noShow && !isPresent) {
 rosterBT.style.display = "block"
 attendBT.style.display = "none"
 currentStatus.innerHTML = "Inscripción finalizada!"
 thisPeriod.value = "0"
 rollStatus.value = "Ausente"
 enableInput()
}

if (isPresent) {
 currentStatus.innerHTML = "Estás presente... revisa el registro."
 rosterBT.style.display = "block"
 attendBT.style.display = "none"
 disableInput()
}



// CURRENT TIME PROGRESS BAR
// =========================
let barSet
let barEnd
let barDif
let dateString = autoDateString + "T"

// NIGHT TIME!
if (isPeriod == 0) { barSet = new Date(dateString+'00:00:00'); barEnd = new Date(dateString+'07:59:59') }
// PERIOD 1!
else if (isPeriod ==  1) { barSet = new Date(dateString+'08:00:00'); barEnd = new Date(dateString+'09:15:00') }
else if (isPeriod == 11) { barSet = new Date(dateString+'09:15:01'); barEnd = new Date(dateString+'09:29:59') }
// PERIOD 2!
else if (isPeriod ==  2) { barSet = new Date(dateString+'09:30:00'); barEnd = new Date(dateString+'10:45:00') }
else if (isPeriod == 12) { barSet = new Date(dateString+'10:45:01'); barEnd = new Date(dateString+'10:59:59') }
// PERIOD 3!
else if (isPeriod ==  3) { barSet = new Date(dateString+'11:00:00'); barEnd = new Date(dateString+'12:15:00') }
else if (isPeriod == 13) { barSet = new Date(dateString+'12:15:01'); barEnd = new Date(dateString+'12:29:59') }
// PERIOD 4!
else if (isPeriod ==  4) { barSet = new Date(dateString+'12:30:00'); barEnd = new Date(dateString+'13:45:00') }
else if (isPeriod == 14) { barSet = new Date(dateString+'13:45:01'); barEnd = new Date(dateString+'13:59:59') }
// PERIOD 5!
else if (isPeriod ==  5) { barSet = new Date(dateString+'14:00:00'); barEnd = new Date(dateString+'15:15:00') }
else if (isPeriod == 15) { barSet = new Date(dateString+'15:15:01'); barEnd = new Date(dateString+'15:29:59') }
// PERIOD 6!
else if (isPeriod ==  6) { barSet = new Date(dateString+'15:30:00'); barEnd = new Date(dateString+'16:45:00') }
else if (isPeriod == 16) { barSet = new Date(dateString+'16:45:01'); barEnd = new Date(dateString+'16:59:59') }
// PERIOD 7!
else if (isPeriod ==  7) { barSet = new Date(dateString+'17:00:00'); barEnd = new Date(dateString+'18:15:00') }
else if (isPeriod == 17) { barSet = new Date(dateString+'18:15:01'); barEnd = new Date(dateString+'18:29:59') }
// PERIOD 8!
else if (isPeriod ==  8) { barSet = new Date(dateString+'18:30:00'); barEnd = new Date(dateString+'19:45:00') }
else if (isPeriod == 18) { barSet = new Date(dateString+'19:45:01'); barEnd = new Date(dateString+'23:59:59') }
// NIGHT TIME AGAIN!
else if (isPeriod == 24) { barSet = new Date(dateString+'19:45:01'); barEnd = new Date(dateString+'23:59:59') }
else { barSet = new Date(dateString+'00:00:00'); barEnd = new Date(dateString+'23:59:59') }

// TESTING HOURS - REMEMBER TO COMMENT OUT!!
// barSet = new Date(dateString+'21:00:00')
// barEnd = new Date(dateString+'22:00:00')

// GETTING PERIOD PROGRESS (PERCENTAGE)!
let thisDiff = (currentTime - barSet)/(barEnd - barSet)*100
let barPercent = parseFloat(thisDiff).toFixed(2)

// BAR COLORS FOR CLASS PERIODS
let barGreeny = 'linear-gradient(to right, lightgreen 0%, #50C878 ' + barPercent + '%, #fff ' + barPercent + '%, lightgray 100%)' 
let barRedish = 'linear-gradient(to right, pink 0%, #FF3333cc ' + barPercent + '%, #fff ' + barPercent + '%, lightgray 100%)'
let barPurple = 'linear-gradient(to right, #FFCCFFaa 0%, #FF66FFcc ' + barPercent + '%, #fff ' + barPercent + '%, lightgray 100%)'
// BAR COLORS FOR NIGHT AND BREAKS
let barBlacky = 'linear-gradient(to right, #FF33FFaa 0%, #883388cc ' + barPercent + '%, #8888CC ' + barPercent + '%, #8888CC 100%)'
let barYellow = 'linear-gradient(to right, #FFFFCC 0%, #FFFF66ee ' + barPercent + '%, #fff ' + barPercent + '%, lightgray 100%)'

// SETTING PROGRESS BAR
if (barPercent < 20) {
 autoTime.style.background = barGreeny
 if (!isPresent && !noShow && inputReady) {
  attendBT.style.background = "green"
  attendBT.innerText = "☝️ PRESENTE!"
  attendBT.style.display = "block"
  rosterBT.style.display = "none"
  currentStatus.innerHTML = "Estás a tiempo... registrate!"
  thisPeriod.value = isPeriod
  rollStatus.value = "Presente"
  enableInput()
 }
}

if (barPercent >= 20 && barPercent <= 40) {
 autoTime.style.background = barRedish
 if (!isPresent && !noShow && inputReady) {
  attendBT.style.background = "red"
  attendBT.innerText = "👇 TARDE!"
  attendBT.style.display = "block"
  rosterBT.style.display = "none"
  currentStatus.innerHTML = "Tarde... registrar igualmente!"
  thisPeriod.value = isPeriod
  rollStatus.value = "Tarde"
  enableInput()
 }
}

if (barPercent > 40) {
 autoTime.style.background = barPurple
  rosterBT.style.display = "block"
  attendBT.style.display = "none"
  enableInput()
}

// BREAKS
if (isPeriod >= 11 && isPeriod <= 17) { autoTime.style.background = barYellow }
if (isPeriod ==  0 || isPeriod == 18) { autoTime.style.background = barBlacky; autoTime.style.color = "#FFFFFFaa" }
else { autoTime.style.color = "#0000CC" }


// ============================ END OF TIME LOOP! ============================
// ============================ END OF TIME LOOP! ============================
// ============================ END OF TIME LOOP! ============================
}, 1000)

if (i < 10) { i = "0" + i }
return i
}



// =============
// ENABLE INPUTS!
// =============
function enableInput() {
 lastNames.readOnly = false
 firstNames.readOnly = false
 lastNames.style.cursor = ""
 firstNames.style.cursor = ""
// ENABLING CLASS & TEACHER FIELD
let urlClass = (new URLSearchParams(window.location.search)).get("clase")
let urlTeach = (new URLSearchParams(window.location.search)).get("profe")
if (urlClass == null && thisClass.value == "") { thisClass.readOnly = false }
if (urlTeach == null && thisTeach.value == "") { thisTeach.readOnly = false }
}

// DISABLE INPUT!
// =============
function disableInput() {
 thisClass.readOnly = true
 thisTeach.readOnly = true
