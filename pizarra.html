<!-- FUNCTION SCRIPTS -->
<script type="text/javascript">
function getClassName() {
  var person = prompt("───────────────\nINGRESE NOMBRE\n(Clase, Unidad, Tema o Fecha):\n───────────────", "Clases Uplanianas!");

    document.getElementById("the_class").innerHTML = person;

<!-- FUNCTION SCRIPTS -->
<script type="text/javascript">
function backgroundColor(input) {
var color = input
document.body.style.backgroundColor = color
}
</script>


<!-- FUNCTION SCRIPTS -->
<script type="text/javascript">
function mobileCheck() {
if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|BB|PlayBook|IEMobile|Windows Phone|Kindle|Silk|Opera Mini/i.test(navigator.userAgent)) {
 let className = document.getElementById("the_class")
 let classButton = document.getElementById("classButton")
 let printButton = document.getElementById("printButton")
 className.style.visibility = "hidden"; className.style.display = "none"
 classButton.style.visibility = "hidden"; classButton.style.display = "none"
 printButton.style.visibility = "hidden"; printButton.style.display = "none"
 }
}
</script>


<!-- FUNCTION SCRIPTS -->
<script type="text/javascript">
function closedForever() {
	if (typeof(Storage) !== "undefined") {
	  localStorage.setItem("warning", "closed");
	  document.getElementById("alert").style.display = "none"; }
	}

if (localStorage.getItem("warning") === "closed") {
  document.getElementById("alert").style.display = "none"; }

</script>
